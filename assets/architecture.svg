<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="monospace">
  <rect width="820" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="30" fill="#58a6ff" font-size="16" font-weight="bold" text-anchor="middle">How to Access File Browser from Windows — Architecture</text>

  <!-- Linux Server box -->
  <rect x="20" y="50" width="380" height="420" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="40" y="75" fill="#58a6ff" font-size="14" font-weight="bold">Linux Server</text>

  <!-- Server 1 -->
  <rect x="40" y="95" width="340" height="165" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="210" y="115" fill="#c9d1d9" font-size="12" text-anchor="middle" font-weight="bold">Server — Storage A</text>

  <rect x="55" y="130" width="150" height="40" rx="6" fill="#0d1117" stroke="#30363d"/>
  <text x="130" y="155" fill="#8b949e" font-size="11" text-anchor="middle">Storage Volume</text>

  <line x1="130" y1="170" x2="130" y2="190" stroke="#30363d" stroke-width="2"/>
  <polygon points="125,185 130,195 135,185" fill="#30363d"/>

  <rect x="55" y="200" width="150" height="45" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="130" y="220" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">File Browser</text>
  <text x="130" y="236" fill="#8b949e" font-size="10" text-anchor="middle">:8080 (web UI)</text>

  <line x1="205" y1="222" x2="225" y2="222" stroke="#30363d" stroke-width="2"/>
  <polygon points="220,217 230,222 220,227" fill="#30363d"/>

  <rect x="235" y="200" width="130" height="45" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="300" y="220" fill="#d2a8ff" font-size="12" text-anchor="middle" font-weight="bold">wsgidav</text>
  <text x="300" y="236" fill="#8b949e" font-size="10" text-anchor="middle">:8081 (WebDAV)</text>

  <!-- Server 2 -->
  <rect x="40" y="280" width="340" height="90" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-dasharray="5,3"/>
  <text x="210" y="300" fill="#58a6ff" font-size="12" text-anchor="middle" font-weight="bold">Server — Storage B</text>

  <rect x="55" y="315" width="130" height="40" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="120" y="335" fill="#3fb950" font-size="11" text-anchor="middle" font-weight="bold">File Browser</text>
  <text x="120" y="348" fill="#8b949e" font-size="9" text-anchor="middle">:8080</text>

  <rect x="235" y="315" width="130" height="40" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="300" y="335" fill="#d2a8ff" font-size="11" text-anchor="middle" font-weight="bold">wsgidav</text>
  <text x="300" y="348" fill="#8b949e" font-size="9" text-anchor="middle">:8081 (WebDAV)</text>

  <!-- Server 3 -->
  <rect x="40" y="385" width="340" height="75" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-dasharray="5,3"/>
  <text x="210" y="405" fill="#58a6ff" font-size="12" text-anchor="middle" font-weight="bold">Server — Storage C</text>

  <rect x="55" y="415" width="130" height="35" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="120" y="435" fill="#3fb950" font-size="11" text-anchor="middle" font-weight="bold">File Browser</text>
  <text x="120" y="447" fill="#8b949e" font-size="9" text-anchor="middle">:8080</text>

  <rect x="235" y="415" width="130" height="35" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="300" y="435" fill="#d2a8ff" font-size="11" text-anchor="middle" font-weight="bold">wsgidav</text>
  <text x="300" y="447" fill="#8b949e" font-size="9" text-anchor="middle">:8081 (WebDAV)</text>

  <!-- Windows Client -->
  <rect x="420" y="95" width="380" height="365" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="2"/>
  <text x="610" y="120" fill="#58a6ff" font-size="14" text-anchor="middle" font-weight="bold">Windows Client</text>

  <!-- HTTP arrows -->
  <line x1="380" y1="222" x2="420" y2="180" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="416,183 423,177 426,186" fill="#30363d"/>

  <line x1="380" y1="335" x2="420" y2="200" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="380" y1="435" x2="420" y2="220" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- rclone -->
  <rect x="440" y="150" width="140" height="45" rx="6" fill="#0d1117" stroke="#f0883e"/>
  <text x="510" y="170" fill="#f0883e" font-size="12" text-anchor="middle" font-weight="bold">rclone mount</text>
  <text x="510" y="186" fill="#8b949e" font-size="10" text-anchor="middle">WinFSP driver</text>

  <!-- Drive boxes -->
  <rect x="620" y="140" width="160" height="45" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="700" y="160" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">Drive X:</text>
  <text x="700" y="176" fill="#8b949e" font-size="10" text-anchor="middle">Storage A</text>

  <rect x="620" y="200" width="160" height="45" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="700" y="220" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">Drive Y:</text>
  <text x="700" y="236" fill="#8b949e" font-size="10" text-anchor="middle">Storage B</text>

  <rect x="620" y="260" width="160" height="45" rx="6" fill="#0d1117" stroke="#3fb950"/>
  <text x="700" y="280" fill="#3fb950" font-size="12" text-anchor="middle" font-weight="bold">Drive Z:</text>
  <text x="700" y="296" fill="#8b949e" font-size="10" text-anchor="middle">Storage C</text>

  <!-- Auto-start -->
  <rect x="440" y="260" width="140" height="45" rx="6" fill="#0d1117" stroke="#d2a8ff"/>
  <text x="510" y="278" fill="#d2a8ff" font-size="11" text-anchor="middle" font-weight="bold">VBS + Registry</text>
  <text x="510" y="294" fill="#8b949e" font-size="10" text-anchor="middle">auto-mount on login</text>

  <!-- File Explorer -->
  <rect x="440" y="340" width="340" height="50" rx="8" fill="#0d1117" stroke="#22d3ee"/>
  <text x="610" y="362" fill="#22d3ee" font-size="13" text-anchor="middle" font-weight="bold">Windows File Explorer</text>
  <text x="610" y="378" fill="#8b949e" font-size="10" text-anchor="middle">Browse, edit, save files directly like local drives</text>

  <!-- Arrows from rclone to drives -->
  <line x1="510" y1="195" x2="510" y2="220" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="505,215 510,225 515,215" fill="#30363d"/>

  <line x1="510" y1="220" x2="620" y2="162" stroke="#30363d" stroke-width="1"/>
  <line x1="510" y1="220" x2="620" y2="222" stroke="#30363d" stroke-width="1"/>
  <line x1="510" y1="220" x2="620" y2="282" stroke="#30363d" stroke-width="1"/>

  <line x1="510" y1="305" x2="510" y2="340" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Cloudflare -->
  <rect x="440" y="410" width="340" height="45" rx="6" fill="#0d1117" stroke="#f0883e"/>
  <text x="610" y="430" fill="#f0883e" font-size="12" text-anchor="middle" font-weight="bold">Cloudflare Tunnel</text>
  <text x="610" y="445" fill="#8b949e" font-size="10" text-anchor="middle">Optional — access from anywhere via domain</text>

  <!-- Internet -->
  <rect x="500" y="480" width="200" height="40" rx="20" fill="#0d1117" stroke="#f85149"/>
  <text x="600" y="500" fill="#f85149" font-size="13" text-anchor="middle" font-weight="bold">Internet</text>
  <text x="600" y="515" fill="#8b949e" font-size="10" text-anchor="middle">Cloudflare</text>

  <line x1="600" y1="455" x2="600" y2="480" stroke="#f0883e" stroke-width="1.5"/>
  <polygon points="595,475 600,485 605,475" fill="#f0883e"/>

  <!-- Legend -->
  <rect x="20" y="490" width="480" height="50" rx="6" fill="#1c2128" stroke="#30363d"/>
  <text x="40" y="510" fill="#8b949e" font-size="11">Legend:</text>
  <rect x="100" y="502" width="10" height="10" fill="#3fb950"/>
  <text x="115" y="512" fill="#8b949e" font-size="10">File Server</text>
  <rect x="200" y="502" width="10" height="10" fill="#f0883e"/>
  <text x="215" y="512" fill="#8b949e" font-size="10">Mount / Tunnel</text>
  <rect x="320" y="502" width="10" height="10" fill="#d2a8ff"/>
  <text x="335" y="512" fill="#8b949e" font-size="10">Automation</text>
  <rect x="420" y="502" width="10" height="10" fill="#22d3ee"/>
  <text x="435" y="512" fill="#8b949e" font-size="10">Client</text>
</svg>
